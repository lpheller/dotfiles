# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false

## minimalistisches Starship-Theme, angepasst an meine Bedürfnisse
# format = """$directory$character"""
palette = "catppuccin_macchiato"
format = "$directory$git_branch$git_status$fill$package$nodejs$php$cmd_duration\n$character"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[fill]
symbol = " "


[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[directory]
truncate_to_repo = false
truncation_length = 5
read_only = " "
style = "bold lavender"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Projects" = " "

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold mauve"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold peach"

[package]
symbol = "󰏗 "
format = "[$symbol$version]($style) "
style = "bold peach"

[nodejs]
format = "[$symbol$version]($style) "
style = "bold green"

[php]
symbol = "🐘 "
format = "[$symbol$version]($style) "
style = "bold sapphire"

[cmd_duration]
min_time = 2_000
format = "[ $duration]($style) "
style = "bold overlay2"
